# ══════════════════════════════════════════════════════════════
#  SmartSwing-NH  ·  Daily Automation (KST)
#
#  ★ 트리거 이중화 구조:
#  [1차] 외부 크론 서비스(cron-job.org)가 정각 15:00에 workflow_dispatch 호출
#        → GitHub Actions 즉시 실행 (큐 우선처리)
#  [2차] 안전망 cron: 14:10 KST (UTC 05:10) — 1차 실패 시 최대 15:10까지 백업
#        (기존 06:00 cron은 피크타임 1시간+ 지연 → 폐기)
#
#  Job 1 — send-alert  : 15:00 KST  Telegram 알림 (외부 트리거 기준)
#  Job 2 — update-udb  : 15:40 KST  Firebase UDB 저장
# ══════════════════════════════════════════════════════════════
name: Daily Automation (15:00 + 15:40 KST)

on:
  schedule:
    # ★ [안전망] UTC 05:10 = KST 14:10 (피크타임 전 선제 실행, 최대 1h 지연돼도 15:10 도착)
    - cron: "10 5 * * 1-5"
    # ★ [안전망] UTC 06:30 = KST 15:30 (UDB 업데이트, 기존 06:40 대비 10분 앞당김)
    - cron: "30 6 * * 1-5"

  # ★ [1차 트리거] 외부 크론 서비스(cron-job.org)가 15:00 정각에 호출
  #    설정 URL: https://api.github.com/repos/plnman/smartswing-nh/actions/workflows/daily_alert.yml/dispatches
  #    Method: POST  Body: {"ref":"main"}  Header: Authorization Bearer <PAT>
  workflow_dispatch:

# ──────────────────────────────────────────────
#  Job 1: Telegram 알림 (15:00 KST)
# ──────────────────────────────────────────────
jobs:
  send-alert:
    name: "📨 15:00 Telegram 알림"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # workflow_dispatch(외부 크론 or 수동) 또는 안전망 cron 14:10(UTC 05:10)만 실행
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '10 5 * * 1-5')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests pykrx pandas numpy firebase-admin

      - name: 15:00 KST Telegram 알림 전송
        env:
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          # 수동(workflow_dispatch) 실행 시 주말도 강제 전송
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python3 scripts/telegram_alert.py

  # ──────────────────────────────────────────────
  #  Job 2: Firebase UDB 업데이트 (15:40 KST)
  # ──────────────────────────────────────────────
  update-udb:
    name: "🔄 15:40 Firebase UDB 업데이트"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # workflow_dispatch(외부 크론 or 수동) 또는 안전망 cron 15:30(UTC 06:30)만 실행
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '30 6 * * 1-5')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          pip install pykrx firebase-admin requests

      - name: 15:40 KST Firebase UDB 업데이트
        env:
          FIREBASE_CREDENTIALS:  ${{ secrets.FIREBASE_CREDENTIALS }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          # 수동 실행 시 당월 강제 업데이트
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python3 scripts/update_udb.py
