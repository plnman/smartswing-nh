# ══════════════════════════════════════════════════════════════
#  SmartSwing-NH  ·  Daily 15:00 KST Telegram Alert
#  GitHub Actions — 평일(월~금) 한국시간 15:00 = UTC 06:00
# ══════════════════════════════════════════════════════════════
name: Daily Alert (15:00 KST)

on:
  schedule:
    # UTC 06:00 = KST 15:00 (월~금)
    - cron: "0 6 * * 1-5"

  # 수동 실행 버튼 (테스트용)
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests

      - name: 15:00 KST Telegram 알림 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          # 수동(workflow_dispatch) 실행 시 주말도 강제 전송
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python3 scripts/telegram_alert.py
